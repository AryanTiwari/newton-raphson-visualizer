<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#3b82f6" />

  <!-- Curve (parabola-like) -->
  <path d="M 12 48 Q 32 8 52 48" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tangent line -->
  <line x1="8" y1="38" x2="56" y2="22" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Point on curve -->
  <circle cx="32" cy="28" r="4" fill="#22c55e" stroke="white" stroke-width="1.5"/>

  <!-- X-intercept point -->
  <circle cx="48" cy="26" r="3" fill="#ef4444" stroke="white" stroke-width="1"/>
</svg>
